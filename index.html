<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News Radar | 24 小时 AI 更新雷达</title>
    <meta name="description" content="自动整理过去 24 小时值得看的 AI、模型和开发者工具更新。" />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <!-- Compact header -->
      <header class="header">
        <div class="header-brand">
          <img class="header-logo" src="./assets/logo.svg" alt="AI 更新雷达" />
          <h1 class="header-title">AI News Radar <span>24 小时更新雷达</span></h1>
        </div>
        <div class="header-meta">
          <span class="header-updated" id="updatedAt">加载中...</span>
        </div>
      </header>

      <!-- Inline stats -->
      <div class="stats-strip" id="stats"></div>

      <!-- Sticky search + mode switch -->
      <div class="controls-bar">
        <div class="search-row">
          <input id="searchInput" class="search-input" type="search" placeholder="搜索 AI 信号 / 来源" />
          <div class="mode-switch">
            <button id="modeAiBtn" class="mode-btn active" type="button">AI 强相关</button>
            <button id="modeAllBtn" class="mode-btn" type="button">全量</button>
          </div>
          <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
            <input id="allDedupeToggle" type="checkbox" checked />
            <span class="dedupe-dot"></span>
            <span id="allDedupeLabel">去重开</span>
          </label>
        </div>
        <div class="filters-row" id="sitePills"></div>
        <div class="coverage-strip" id="coverageStrip"></div>
      </div>

      <!-- News list (the star) -->
      <section class="list-section">
        <div class="list-header">
          <h2 id="listTitle">AI 信号流</h2>
          <span class="list-count" id="resultCount">0</span>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>

      <!-- WaytoAGI (collapsed) -->
      <details class="waytoagi-section">
        <summary class="waytoagi-toggle">
          <span>WaytoAGI 更新日志 <span class="waytoagi-badge" id="waytoagiBadge"></span></span>
        </summary>
        <div class="waytoagi-body">
          <div class="waytoagi-meta" id="waytoagiMeta"></div>
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;">
            <div class="waytoagi-switch">
              <button id="waytoagiTodayBtn" class="waytoagi-btn active" type="button">最近更新日</button>
              <button id="waytoagi7dBtn" class="waytoagi-btn" type="button">近 7 日</button>
            </div>
            <span id="waytoagiUpdatedAt" style="font-size:12px;color:var(--ink-muted);"></span>
          </div>
          <div id="waytoagiList" class="waytoagi-list"></div>
        </div>
      </details>

      <!-- Advanced: source health (collapsed) -->
      <details class="advanced-section">
        <summary class="advanced-toggle">
          <span>源状态 <span class="advanced-badge" id="advancedSummary"></span></span>
        </summary>
        <div class="advanced-body">
          <div class="source-health" id="sourceHealth"></div>
        </div>
      </details>
    </main>

    <template id="itemTpl">
      <article class="news-card">
        <div class="meta-row">
          <span class="site-tag"></span>
          <span class="category-tag"></span>
          <span class="source-tag"></span>
          <time class="time-tag"></time>
        </div>
        <a class="title-link" target="_blank" rel="noopener noreferrer"></a>
      </article>
    </template>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
